<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MochiMUD SignalR Test</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 2rem;
        }

        button,
        input {
            font: inherit;
        }

        .players {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(24rem, 1fr));
        }

        .player {
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .command-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .command-form label {
            align-self: center;
        }

        .command-input {
            box-sizing: border-box;
            flex: 1;
            width: 100%;
        }

        .status {
            margin-top: 1rem;
            white-space: pre-line;
        }

        .output {
            box-sizing: border-box;
            display: block;
            height: 28rem;
            margin-top: 1rem;
            overflow-y: auto;
            padding: 0.75rem;
            white-space: pre-line;
            width: 100%;
        }

        .output-message + .output-message {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <h1>MochiMUD SignalR Test</h1>
    <p>Connect two players to the MudHub and send commands independently.</p>

    <div class="players">
        <section class="player" data-player="1">
            <h2>Player 1</h2>
            <div class="status">Connecting...</div>
            <div class="output" role="log" aria-label="Player 1 server output"></div>

            <form class="command-form">
                <label for="commandInput1">Command</label>
                <input id="commandInput1" class="command-input" type="text" value="look" autocomplete="off">
                <button class="send-button" type="submit" disabled>Send Command</button>
            </form>
        </section>

        <section class="player" data-player="2">
            <h2>Player 2</h2>
            <div class="status">Connecting...</div>
            <div class="output" role="log" aria-label="Player 2 server output"></div>

            <form class="command-form">
                <label for="commandInput2">Command</label>
                <input id="commandInput2" class="command-input" type="text" value="look" autocomplete="off">
                <button class="send-button" type="submit" disabled>Send Command</button>
            </form>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <script>
        const maxCommandHistoryLength = 50;

        function createPlayerClient(playerElement) {
            const status = playerElement.querySelector(".status");
            const output = playerElement.querySelector(".output");
            const form = playerElement.querySelector(".command-form");
            const input = playerElement.querySelector(".command-input");
            const sendButton = playerElement.querySelector(".send-button");
            const commandHistory = [];
            let commandHistoryIndex = -1;

            const connection = new signalR.HubConnectionBuilder()
                .withUrl("/mudHub")
                .withAutomaticReconnect()
                .build();

            connection.on("ReceiveMessage", (message) => {
                appendOutput(message);
            });

            function appendOutput(message) {
                const messageElement = document.createElement("div");
                messageElement.className = "output-message";
                messageElement.textContent = message;

                output.appendChild(messageElement);
                output.scrollTop = output.scrollHeight;
            }

            async function start() {
                try {
                    await connection.start();
                    sendButton.disabled = false;
                    status.textContent = "Connected. Sending test command...";
                    await sendCommand(input.value);
                } catch (error) {
                    status.textContent = `Connection failed: ${error}`;
                }
            }

            async function sendCommand(commandText) {
                const command = commandText.trim();

                if (!command) {
                    status.textContent = "Enter a command before sending.";
                    return;
                }

                try {
                    await connection.invoke("SendCommand", command);
                    recordCommand(command);
                    input.value = "";
                    input.focus();
                    status.textContent = `Sent command: ${command}`;
                } catch (error) {
                    status.textContent = `Send failed: ${error}`;
                }
            }

            function recordCommand(command) {
                commandHistory.push(command);

                if (commandHistory.length > maxCommandHistoryLength) {
                    commandHistory.shift();
                }

                commandHistoryIndex = -1;
            }

            function recallPreviousCommand() {
                if (!commandHistory.length) {
                    return;
                }

                if (commandHistoryIndex < commandHistory.length - 1) {
                    commandHistoryIndex++;
                }

                input.value = commandHistory[commandHistory.length - 1 - commandHistoryIndex];
                input.setSelectionRange(input.value.length, input.value.length);
            }

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                await sendCommand(input.value);
            });

            input.addEventListener("keydown", (event) => {
                if (event.key !== "ArrowUp") {
                    return;
                }

                event.preventDefault();
                recallPreviousCommand();
            });

            return {
                input,
                start
            };
        }

        const playerClients = Array
            .from(document.querySelectorAll(".player"))
            .map(createPlayerClient);

        playerClients[0].input.focus();

        Promise
            .all(playerClients.map((playerClient) => playerClient.start()))
            .then(() => {
                playerClients[0].input.focus();
            });
    </script>
</body>
</html>
