<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MochiMUD SignalR Test</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 2rem;
            max-width: 40rem;
        }

        button,
        input {
            font: inherit;
        }

        #status {
            margin-top: 1rem;
            white-space: pre-line;
        }

        #output {
            box-sizing: border-box;
            display: block;
            height: 28rem;
            margin-top: 1rem;
            overflow-y: auto;
            padding: 0.75rem;
            white-space: pre-line;
            width: 100%;
        }

        .output-message + .output-message {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <h1>MochiMUD SignalR Test</h1>
    <p>Connect to the MudHub and send a test command to the server.</p>

    <form id="commandForm">
        <label for="commandInput">Command</label>
        <input id="commandInput" type="text" value="look" autocomplete="off">
        <button id="sendButton" type="submit" disabled>Send Command</button>
    </form>

    <div id="status">Connecting...</div>
    <div id="output" role="log" aria-label="Server output"></div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <script>
        const status = document.getElementById("status");
        const output = document.getElementById("output");
        const form = document.getElementById("commandForm");
        const input = document.getElementById("commandInput");
        const sendButton = document.getElementById("sendButton");
        const maxCommandHistoryLength = 50;
        const commandHistory = [];
        let commandHistoryIndex = -1;

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/mudHub")
            .withAutomaticReconnect()
            .build();

        connection.on("ReceiveMessage", (message) => {
            appendOutput(message);
        });

        function appendOutput(message) {
            const messageElement = document.createElement("div");
            messageElement.className = "output-message";
            messageElement.textContent = message;

            output.appendChild(messageElement);
            output.scrollTop = output.scrollHeight;
        }

        async function start() {
            try {
                input.focus();
                await connection.start();
                sendButton.disabled = false;
                status.textContent = "Connected. Sending test command...";
                await sendCommand(input.value);
            } catch (error) {
                status.textContent = `Connection failed: ${error}`;
            }
        }

        async function sendCommand(commandText) {
            const command = commandText.trim();

            if (!command) {
                status.textContent = "Enter a command before sending.";
                return;
            }

            try {
                await connection.invoke("SendCommand", command);
                recordCommand(command);
                input.value = "";
                input.focus();
                status.textContent = `Sent command: ${command}`;
            } catch (error) {
                status.textContent = `Send failed: ${error}`;
            }
        }

        function recordCommand(command) {
            commandHistory.push(command);

            if (commandHistory.length > maxCommandHistoryLength) {
                commandHistory.shift();
            }

            commandHistoryIndex = -1;
        }

        function recallPreviousCommand() {
            if (!commandHistory.length) {
                return;
            }

            if (commandHistoryIndex < commandHistory.length - 1) {
                commandHistoryIndex++;
            }

            input.value = commandHistory[commandHistory.length - 1 - commandHistoryIndex];
            input.setSelectionRange(input.value.length, input.value.length);
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            await sendCommand(input.value);
        });

        input.addEventListener("keydown", (event) => {
            if (event.key !== "ArrowUp") {
                return;
            }

            event.preventDefault();
            recallPreviousCommand();
        });

        start();
    </script>
</body>
</html>
