<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MochiMUD</title>
    <link rel="stylesheet" href="/site.css">
</head>
<body class="game-body">
    <div class="header">
        <div class="header-content">
            <h1>MochiMUD</h1>
            <button id="logoutButton" type="button">Log out</button>
        </div>
    </div>

    <section class="player single">
        <div class="output" role="log" aria-label="Server output">
            <div class="output-content"></div>
        </div>

        <form class="command-form">
            <input id="commandInput" class="command-input" type="text" autocomplete="off" aria-label="Command">
            <button class="send-button" type="submit" title="Send Command" aria-label="Send Command" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <line x1="4" y1="12" x2="20" y2="12"></line>
                    <polyline points="13 5 20 12 13 19"></polyline>
                </svg>
            </button>
        </form>
    </section>

    <footer class="status-bar">
        <div class="status-bar-content">
            <span class="player-stats" aria-live="polite">
                <span class="hp-display"></span>
                <span class="mana-display"></span>
            </span>
            <span class="status">
                <span class="status-dot" aria-hidden="true"></span>
                <span class="status-text" role="status">Connecting...</span>
            </span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <script>
        const maxCommandHistoryLength = 50;

        function createPlayerClient(playerElement) {
            const status = document.querySelector(".status-text");
            const statusDot = document.querySelector(".status-dot");
            const hpDisplay = document.querySelector(".hp-display");
            const manaDisplay = document.querySelector(".mana-display");
            const output = playerElement.querySelector(".output");
            const outputContent = playerElement.querySelector(".output-content");
            const form = playerElement.querySelector(".command-form");
            const input = playerElement.querySelector(".command-input");
            const sendButton = playerElement.querySelector(".send-button");
            const commandHistory = [];
            let commandHistoryIndex = -1;

            const connection = new signalR.HubConnectionBuilder()
                .withUrl("/mudHub")
                .withAutomaticReconnect()
                .build();

            connection.on("ReceiveHtmlMessage", (message) => {
                appendHtmlOutput(message);
            });

            connection.on("ReceivePlayerStatsUpdate", (update) => {
                updateHitPoints(update);
            });

            function updateHitPoints(update) {
                if (!update) {
                    return;
                }

                const hitPoints = update.hitPoints ?? update.HitPoints;
                const mana = update.mana ?? update.Mana;
                const current = hitPoints?.current ?? hitPoints?.Current;
                const max = hitPoints?.maximum ?? hitPoints?.Maximum;
                const currentMana = mana?.current ?? mana?.Current;
                const maxMana = mana?.maximum ?? mana?.Maximum;

                if (current === undefined || max === undefined) {
                    return;
                }

                const currentElement = document.createElement("span");
                currentElement.className = "hp-current";
                currentElement.textContent = current;

                const restElement = document.createElement("span");
                restElement.className = "hp-rest";
                restElement.textContent = `/${max} hp`;

                hpDisplay.replaceChildren(currentElement, restElement);

                if (currentMana === undefined || maxMana === undefined) {
                    manaDisplay.replaceChildren();
                    return;
                }

                const currentManaElement = document.createElement("span");
                currentManaElement.className = "mana-current";
                currentManaElement.textContent = currentMana;

                const manaRestElement = document.createElement("span");
                manaRestElement.className = "mana-rest";
                manaRestElement.textContent = `/${maxMana} mana`;

                manaDisplay.replaceChildren(currentManaElement, manaRestElement);
            }

            function appendHtmlOutput(message) {
                const messageElement = document.createElement("div");
                messageElement.className = "output-message";
                messageElement.innerHTML = message;

                outputContent.appendChild(messageElement);
                output.scrollTop = output.scrollHeight;
            }

            async function start() {
                try {
                    await connection.start();
                    sendButton.disabled = false;
                    status.textContent = "Connected";
                    statusDot.classList.add("is-connected");
                } catch (error) {
                    status.textContent = `Connection failed: ${error}`;
                    statusDot.classList.remove("is-connected");
                }
            }

            async function sendCommand(commandText) {
                const command = commandText.trim();

                if (!command) {
                    status.textContent = "Enter a command before sending.";
                    return;
                }

                try {
                    await connection.invoke("SendCommand", command);
                    recordCommand(command);
                    input.value = "";
                    input.focus();
                } catch (error) {
                    status.textContent = `Send failed: ${error}`;
                }
            }

            function recordCommand(command) {
                commandHistory.push(command);

                if (commandHistory.length > maxCommandHistoryLength) {
                    commandHistory.shift();
                }

                commandHistoryIndex = -1;
            }

            function recallPreviousCommand() {
                if (!commandHistory.length) {
                    return;
                }

                if (commandHistoryIndex < commandHistory.length - 1) {
                    commandHistoryIndex++;
                }

                input.value = commandHistory[commandHistory.length - 1 - commandHistoryIndex];
                input.setSelectionRange(input.value.length, input.value.length);
            }

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                await sendCommand(input.value);
            });

            input.addEventListener("keydown", (event) => {
                if (event.key !== "ArrowUp") {
                    return;
                }

                event.preventDefault();
                recallPreviousCommand();
            });

            return {
                input,
                start
            };
        }

        async function ensureAuthenticated() {
            try {
                const response = await fetch("/auth/me", { credentials: "same-origin" });

                if (response.ok) {
                    return true;
                }
            } catch {
                // Fall through to redirect.
            }

            window.location.replace("/login.html");
            return false;
        }

        const logoutButton = document.getElementById("logoutButton");

        logoutButton.addEventListener("click", async () => {
            logoutButton.disabled = true;

            try {
                await fetch("/auth/logout", { method: "POST", credentials: "same-origin" });
            } catch {
                // Redirect regardless of failure.
            }

            window.location.replace("/login.html");
        });

        ensureAuthenticated().then((authenticated) => {
            if (!authenticated) {
                return;
            }

            const playerClient = createPlayerClient(document.querySelector(".player"));

            playerClient.input.focus();

            playerClient.start().then(() => {
                playerClient.input.focus();
            });
        });
    </script>
</body>
</html>
